services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wedding_db
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

  api:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3013:3013'
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:root@db:3306/wedding_db
      PORT: 3013

volumes:
  mysql_data:
